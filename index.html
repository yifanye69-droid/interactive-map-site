<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#a8d8f0" />
  <title>节庆岛屿 · 互动地图</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <header class="site-header">
    <p class="site-header__tag">互动地图</p>
    <h1 class="site-header__title">节庆岛屿</h1>
    <p class="site-header__desc">拖动探索 · 悬停查看热点 · 点击进入各区域</p>
  </header>

  <div id="viewport" class="viewport">
    <div id="stage" class="stage">
      <img id="map-image" class="map-image" src="assets/map/island-map.png" width="8285" height="5390" alt="节庆岛屿地图" draggable="false" />
      <div id="hotspots" class="hotspots"></div>
    </div>
  </div>

  <div class="controls">
    <button type="button" class="controls__btn" data-action="zoom-in" aria-label="放大">+</button>
    <button type="button" class="controls__btn" data-action="zoom-out" aria-label="缩小">−</button>
    <button type="button" class="controls__btn" data-action="reset" aria-label="重置">⌂</button>
  </div>
  <p class="mobile-hint">双指缩放 · 单指拖动 · 点击圆点进入区域</p>

  <script src="js/map-engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
